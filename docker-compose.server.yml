# 服务器端 Docker Compose 配置
# 用途：使用 Docker Hub 镜像部署，无需本地构建

services:
  # Next.js 应用（生产环境 - 使用远程镜像）
  app:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/kerkerker:${IMAGE_VERSION:-latest}
    container_name: kerkerker-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MONGODB_URI=mongodb://mongodb:27017/kerkerker
      - NEXT_PUBLIC_DOUBAN_API_URL=${NEXT_PUBLIC_DOUBAN_API_URL}
    depends_on:
      - mongodb
    volumes:
      - kerkerker-cache:/app/public/cache
    networks:
      - kerkerker-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # MongoDB 数据库服务
  mongodb:
    image: mongo:7
    container_name: kerkerker-mongodb
    command: mongod --setParameter diagnosticDataCollectionEnabled=false
    environment:
      - MONGO_INITDB_DATABASE=kerkerker
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kerkerker-network
    restart: unless-stopped

networks:
  kerkerker-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  kerkerker-cache:
    driver: local
