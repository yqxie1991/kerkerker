# 服务器端 Docker Compose 配置 (去数据库极致精简版)
# 用途：使用 Docker Hub 镜像部署，无需本地构建

services:
  # Next.js 应用（生产环境 - 使用远程镜像）
  app:
    image: ${DOCKER_USERNAME:-your-dockerhub-username}/bukan:${IMAGE_VERSION:-latest}
    container_name: bukan-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    volumes:
      - bukan-cache:/app/public/cache
      - bukan-data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

volumes:
  bukan-cache:
    driver: local
  bukan-data:
    driver: local
