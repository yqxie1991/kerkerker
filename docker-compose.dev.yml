services:
  # Next.js 应用（开发环境 - 热重载）
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: kerkerker-app-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - MONGODB_URI=mongodb://mongodb:27017/kerkerker
      - NEXT_PUBLIC_DOUBAN_API_URL=${NEXT_PUBLIC_DOUBAN_API_URL}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 挂载本地代码，支持热重载
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - mongodb
    networks:
      - kerkerker-network
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MongoDB 数据库服务（开发环境）
  mongodb:
    image: mongo:7
    container_name: kerkerker-mongodb-dev
    command: mongod --setParameter diagnosticDataCollectionEnabled=false
    environment:
      - MONGO_INITDB_DATABASE=kerkerker
    volumes:
      - mongodb-data-dev:/data/db
      - mongodb-config-dev:/data/configdb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kerkerker-network

networks:
  kerkerker-network:
    driver: bridge

volumes:
  mongodb-data-dev:
    driver: local
  mongodb-config-dev:
    driver: local
