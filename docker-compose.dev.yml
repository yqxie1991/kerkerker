services:
  # Next.js 应用（开发环境 - 热重载 - 极致精简版）
  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: bukan-app-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 挂载本地代码，支持热重载
      - .:/app
      - /app/node_modules
      - /app/.next
      - ./data:/app/data                      # 数据挂载
    stdin_open: true
    tty: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
