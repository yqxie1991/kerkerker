# =====================================================================
# 🎬 “不看 (bukan)” 影视资源聚合平台 - 群晖 NAS 生产部署专用配置
# =====================================================================
# 💡 提示：
#    1. 本配置已针对群晖进行了极致调优（控制空闲磁盘写盘、限制内存占用为 256MB）。
#    2. 使用已打包的远程镜像部署，无需在群晖本地进行高负载的编译打包。
#    3. 全面适配了最新更名的 bukan 命名空间与独立卷，干净整洁。
# =====================================================================

version: '3.8'

services:
  # 🌐 App 服务：Next.js 前端与 API 聚合网关
  app:
    # 💡 提示：版本号默认为 v2.0，部署前请务必前往 GitHub 查看最新 Release 并修改为最新版本号！
    image: ghcr.io/yqxie1991/bukan:v2.0   # 👈 远程编译好的轻量化生产镜像
    container_name: bukan-app
    ports:
      - "3008:3000"              # Lucky 反代指向的群晖内网端口
    environment:
      - NODE_ENV=production
      
      # ⚠️【安全警示】由于此项目已在 GitHub 公开，默认密码默认为 "bukan"！
      # 强烈建议在部署前修改为您的自定义私有强密码，以防止他人扫描并越权登录您的后台！
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-bukan}
      
      - MONGODB_URI=mongodb://mongodb:27017/bukan   # 👈 数据库名称已升级为 bukan
      - PORT=3000
    depends_on:
      - mongodb
    volumes:
      - bukan-cache:/app/public/cache             # 👈 缓存卷已升级为 bukan-cache
    networks:
      - bukan-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"          # 限制单个日志文件最大为 10MB，防止长久运行撑爆群晖系统盘
        max-file: "3"
    restart: unless-stopped

  # 🍃 Database 服务：MongoDB 数据库
  # 🛠️ 针对群晖机械硬盘进行了极致优化：关闭 Journal、关闭诊断收集、锁定内存，防咔哒声并保护硬盘寿命
  mongodb:
    # ⚠️【群晖 CPU 兼容防闪退指南】：
    #    MongoDB 5.0+ (包括 7.0) 要求 CPU 必须支持 AVX 指令集。
    #    绝大多数群晖 CPU（如 J3455、J4125、N5105 等）不支持 AVX，运行 mongo:7 会发生崩溃闪退！
    #    如果您的容器启动后反复重启，请将下方 image 一行修改为：image: mongo:4.4
    image: mongo:7
    container_name: bukan-mongodb
    # 调优参数解释：
    # --nojournal: 关闭日志持久化写入，大幅减少空闲时磁盘写入量，免去磁头咔哒噪音并保护硬盘寿命。
    # --quiet: 压制冗余日志，保持后台安静。
    # --wiredTigerCacheSizeGB 0.25: 将 WiredTiger 缓存限制在 256MB，防止其无节制吃满主机内存。
    # --setParameter diagnosticDataCollectionEnabled=false: 彻底禁用后台定期数据诊断收集，消灭后台高频微写盘。
    command: mongod --nojournal --quiet --wiredTigerCacheSizeGB 0.25 --setParameter diagnosticDataCollectionEnabled=false
    ports:
      - "27018:27017"            # 外部连接数据库端口（可选，不需要可注释掉）
    environment:
      - MONGO_INITDB_DATABASE=bukan               # 👈 数据库初始化名称已升级为 bukan
    volumes:
      - mongodb-data:/data/db                     # 👈 数据库数据卷
      - mongodb-config:/data/configdb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bukan-network
    restart: unless-stopped

networks:
  bukan-network:                                  # 👈 独立网络已升级为 bukan-network
    driver: bridge

volumes:
  # 👈 在底部注册这些新命名的 bukan 数据卷
  mongodb-data:
    driver: local  # 数据库持久化卷
  mongodb-config:
    driver: local  # 数据库配置卷
  bukan-cache:
    driver: local  # 图片海报缓存卷
