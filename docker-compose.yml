services:
  # 🎬 “不看 (bukan)” Next.js 影视应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bukan-app
    ports:
      - "3008:3000"
    environment:
      - NODE_ENV=production
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - MONGODB_URI=mongodb://mongodb:27017/bukan
      - NEXT_PUBLIC_DOUBAN_API_URL=${NEXT_PUBLIC_DOUBAN_API_URL:-}
    depends_on:
      - mongodb
    volumes:
      - bukan-cache:/app/public/cache
    networks:
      - bukan-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped

  # 🍃 MongoDB 数据库服务（深度优化：减小内存开销与压制磁盘频繁写入）
  mongodb:
    image: mongo:7
    container_name: bukan-mongodb
    command: mongod --nojournal --quiet --wiredTigerCacheSizeGB 0.25 --setParameter diagnosticDataCollectionEnabled=false
    ports:
      - "27018:27017"
    environment:
      - MONGO_INITDB_DATABASE=bukan
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bukan-network
    restart: unless-stopped

networks:
  bukan-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  bukan-cache:
    driver: local
