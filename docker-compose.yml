# =====================================================================
# 🎬 “不看 (bukan)” 影视资源聚合平台 - 群晖 NAS 生产部署专用配置
# =====================================================================
# 💡 提示：
#    1. 本配置已针对群晖进行了极致调优（控制空闲磁盘写盘、限制内存占用为 256MB）。
#    2. 使用已打包的远程镜像部署，无需在群晖本地进行高负载的编译打包。
#    3. 卷名保持了您原本的命名（kerkerker），容器重建升级后历史记录和海报绝不丢失！
# =====================================================================

version: '3.8'

services:
  # 🌐 App 服务：Next.js 前端与 API 聚合网关
  app:
    image: ghcr.io/yqxie1991/kerkerker:v1.5
    container_name: bukan-app
    ports:
      - "3008:3000"              # Lucky 反代指向的群晖内网端口
    environment:
      - NODE_ENV=production
      
      # ⚠️【安全警示】强烈建议在部署前修改此处的默认管理密码（防止被他人越权扫后台）！
      # 您可以直接在此处将 "yqxie!23" 替换为您的自定义私有强密码。
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-yqxie!23}
      
      - MONGODB_URI=mongodb://mongodb:27017/kerkerker
      - PORT=3000
    depends_on:
      - mongodb
    volumes:
      # 👈 保持使用您原有的卷名，完美防范升级/重建容器后的海报丢失与裂图
      - kerkerker-cache:/app/public/cache
    networks:
      - kerkerker-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"          # 限制单个日志文件最大为 10MB，防止长久运行撑爆群晖系统盘
        max-file: "3"
    restart: unless-stopped

  # 🍃 Database 服务：MongoDB 7.0 数据库
  # 🛠️ 针对群晖机械硬盘进行了极致优化：关闭 Journal、关闭诊断收集、锁定内存，防咔哒声并保护硬盘寿命
  mongodb:
    image: mongo:7
    container_name: bukan-mongodb
    # 调优参数解释：
    # --nojournal: 关闭日志持久化写入，大幅减少空闲时磁盘写入量，免去磁头咔哒噪音并保护硬盘寿命。
    # --quiet: 压制冗余日志，保持后台安静。
    # --wiredTigerCacheSizeGB 0.25: 将 WiredTiger 缓存限制在 256MB，防止其无节制吃满主机内存。
    # --setParameter diagnosticDataCollectionEnabled=false: 彻底禁用后台定期数据诊断收集，消灭后台高频微写盘。
    command: mongod --nojournal --quiet --wiredTigerCacheSizeGB 0.25 --setParameter diagnosticDataCollectionEnabled=false
    ports:
      - "27018:27017"            # 外部连接数据库端口（可选，不需要可注释掉）
    environment:
      - MONGO_INITDB_DATABASE=kerkerker
    volumes:
      # 👈 保持使用您原有的卷名，重启和升级后完美继承所有的观影历史记录！
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kerkerker-network
    restart: unless-stopped

networks:
  kerkerker-network:
    driver: bridge

volumes:
  # 👈 必须在底部注册这些数据卷，否则 Docker Compose 会报错
  mongodb-data:
    driver: local  # 数据库持久化卷
  mongodb-config:
    driver: local  # 数据库配置卷
  kerkerker-cache:
    driver: local  # 图片海报缓存卷
