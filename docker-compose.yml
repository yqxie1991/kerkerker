# =====================================================================
# 🎬 “不看 (bukan)” 影视资源聚合平台 - 群晖 NAS 极致精简版部署配置
# =====================================================================
# 💡 提示：
#    1. 本配置为去数据库极致精简版，已彻底移除 MongoDB 数据库服务。
#    2. 整个系统仅包含一个 App 容器，内存占用极低（几毫瓦/几十MB），磁盘几乎完全静默。
#    3. 配置数据持久化在本地 JSON 文件中（挂载在 bukan-data 卷）。
# =====================================================================

version: '3.8'

services:
  # 🌐 App 服务：Next.js 前端与 API 聚合网关
  app:
    image: ghcr.io/yqxie1991/bukan:v2.0
    container_name: bukan-app
    ports:
      - "3008:3000"              # Lucky 反代指向的群晖内网端口
    environment:
      - NODE_ENV=production
      
      # ⚠️【安全警示】由于此项目已在 GitHub 公开，默认密码默认为 "bukan"！
      # 强烈建议在部署前修改为您的自定义私有强密码，以防止他人扫描并越权登录您的后台！
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-bukan}
      
      - PORT=3000
    volumes:
      - bukan-cache:/app/public/cache             # 缓存卷，防容器重建升级后海报裂图
      - bukan-data:/app/data                      # 数据持久化卷，保存视频源、短剧源、播放器配置等
    logging:
      driver: "json-file"
      options:
        max-size: "10m"          # 限制单个日志文件最大为 10MB，防止长久运行撑爆群晖系统盘
        max-file: "3"
    restart: unless-stopped

volumes:
  bukan-cache:
    driver: local  # 图片海报缓存卷
  bukan-data:
    driver: local  # 极致精简版 JSON 数据持久化卷
