# =====================================================================
# 🎬 “不看 (bukan)” 影视资源聚合平台 - Docker Compose 生产部署配置
# =====================================================================
# 💡 提示：
#    在部署前，建议在同级目录下创建一个 `.env` 文件来配置敏感环境变量。
#    或在启动前仔细核对以下各个服务的 environment 环境变量。
# =====================================================================

services:
  # 🌐 App 服务：Next.js 前端与 API 聚合网关
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bukan-app
    ports:
      - "3008:3000"              # 外部访问端口，可根据实际需求更改（如 "80:3000"）
    environment:
      - NODE_ENV=production
      
      # ⚠️【安全警示】强烈建议在生产部署前修改此处的默认管理密码！
      # 推荐做法：在同级目录创建 `.env` 文件，并在其中写入 `ADMIN_PASSWORD=你自己的强密码`
      # 或是直接将下面的 "admin123" 替换为你的私有强密码。
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      
      - MONGODB_URI=mongodb://mongodb:27017/bukan  # 链接同网络内的 MongoDB 服务
      - NEXT_PUBLIC_DOUBAN_API_URL=${NEXT_PUBLIC_DOUBAN_API_URL:-} # 可选：豆瓣海报海报反代 API 地址
    depends_on:
      - mongodb                  # 确保 MongoDB 数据库先启动
    volumes:
      - bukan-cache:/app/public/cache # 挂载图片/海报等静态资源缓存卷，避免容器重启后丢失
    networks:
      - bukan-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"          # 限制单个日志文件最大为 10MB
        max-file: "3"            # 最多保留 3 个日志归档，防止日志撑爆磁盘
    restart: unless-stopped      # 除非手动停止，否则容器崩溃或宿主机重启时自动拉起

  # 🍃 Database 服务：MongoDB 7.0 数据库
  # 🛠️ 针对群晖 NAS (Synology DSM) 及机械硬盘家用服务器进行了极致优化，防硬盘频繁写盘
  mongodb:
    image: mongo:7
    container_name: bukan-mongodb
    # 调优参数解释：
    # --nojournal: 关闭日志持久化写入，大幅减少空闲时磁盘写入量，免去磁头咔哒噪音并保护硬盘寿命。
    # --quiet: 压制冗余日志，保持后台安静。
    # --wiredTigerCacheSizeGB 0.25: 将 WiredTiger 缓存限制在 256MB，防止其无节制吃满主机内存。
    # --setParameter diagnosticDataCollectionEnabled=false: 彻底禁用后台定期数据诊断收集，消灭后台高频微写盘。
    command: mongod --nojournal --quiet --wiredTigerCacheSizeGB 0.25 --setParameter diagnosticDataCollectionEnabled=false
    ports:
      - "27018:27017"            # 外部数据库连接端口（可用于外部管理，不需要可注释掉此端口映射以提高安全性）
    environment:
      - MONGO_INITDB_DATABASE=bukan
    volumes:
      - mongodb-data:/data/db        # 数据库持久化数据卷
      - mongodb-config:/data/configdb # 数据库配置卷
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - bukan-network
    restart: unless-stopped

networks:
  bukan-network:
    driver: bridge               # 创建独立的桥接网络，隔离外界非必要访问

volumes:
  mongodb-data:
    driver: local
  mongodb-config:
    driver: local
  bukan-cache:
    driver: local

